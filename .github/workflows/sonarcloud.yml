# Настройка: https://sonarcloud.io → импорт репозитория → GitHub → Secrets → SONAR_TOKEN.
# sonar.organization и sonar.projectKey в sonar-project.properties должны совпадать с проектом.
# Пока проект в SonarCloud не создан или токен не выдан, шаг помечается предупреждением, но не валит CI.

name: SonarCloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    if: github.event.repository.fork == false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
